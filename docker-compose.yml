version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      requests[socks]
      hdfs
      beautifulsoup4
      pdfplumber
      pandas
      pymongo
    MONGO_URI: "mongodb://mongo:27017"
    MONGO_DB: "belgique"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - ingestion-net

services:

  # ── PostgreSQL (Airflow metadata) ──────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - ingestion-net

  # ── Airflow init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # ── Airflow webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped

  # ── HDFS Namenode (image multi-arch native ARM64) ─────────────────────────
  namenode:
    image: apache/hadoop:3
    container_name: hdfs-namenode
    restart: unless-stopped
    user: root
    ports:
      - "9870:9870"   # WebHDFS UI
      - "9000:9000"   # HDFS RPC
    environment:
      HADOOP_HOME: /opt/hadoop
    command: >
      bash -c "
        hdfs namenode -format -force -nonInteractive &&
        hdfs namenode
      "
    volumes:
      - namenode-data:/opt/hadoop/data/namenode
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    networks:
      - ingestion-net

  # ── HDFS Datanode (image multi-arch native ARM64) ──────────────────────────
  datanode:
    image: apache/hadoop:3
    container_name: hdfs-datanode
    restart: unless-stopped
    user: root
    ports:
      - "9864:9864"
    command: hdfs datanode
    volumes:
      - datanode-data:/opt/hadoop/data/datanode
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    depends_on:
      - namenode
    networks:
      - ingestion-net

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ingestion-net

  # ── Mongo Express (UI) ─────────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo
    networks:
      - ingestion-net

  # ── Tor proxies ────────────────────────────────────────────────────────────
  tor1:
    image: dperson/torproxy
    container_name: tor1
    restart: unless-stopped
    ports:
      - "9050:9050"
      - "9051:9051"
    environment:
      - CONTROL_PASSWORD=mypass
    networks:
      - ingestion-net

  tor2:
    image: dperson/torproxy
    container_name: tor2
    restart: unless-stopped
    ports:
      - "9052:9050"
      - "9053:9051"
    environment:
      - CONTROL_PASSWORD=mypass
    networks:
      - ingestion-net

  tor3:
    image: dperson/torproxy
    container_name: tor3
    restart: unless-stopped
    ports:
      - "9054:9050"
      - "9055:9051"
    environment:
      - CONTROL_PASSWORD=mypass
    networks:
      - ingestion-net

volumes:
  postgres-data:
  namenode-data:
  datanode-data:
  mongo-data:

networks:
  ingestion-net:
    driver: bridge